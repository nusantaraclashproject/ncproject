<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 350">
  <defs>
    <linearGradient id="shirtGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E63946;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A4161A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shirt Body -->
  <path d="M 60 80 L 80 60 L 220 60 L 240 80 L 240 250 Q 240 280 210 290 L 90 290 Q 60 280 60 250 Z" fill="url(#shirtGradient)" stroke="#000" stroke-width="2"/>
  
  <!-- Sleeves -->
  <ellipse cx="40" cy="100" rx="25" ry="50" fill="#D32F2F" stroke="#000" stroke-width="2"/>
  <ellipse cx="260" cy="100" rx="25" ry="50" fill="#D32F2F" stroke="#000" stroke-width="2"/>
  
  <!-- Neckline -->
  <ellipse cx="150" cy="75" rx="30" ry="20" fill="#000" stroke="#000" stroke-width="1"/>
  
  <!-- Logo Circle -->
  <circle cx="150" cy="170" r="45" fill="#FFD60A" stroke="#FFC300" stroke-width="2"/>
  
  <!-- Logo Pattern -->
  <text x="150" y="175" text-anchor="middle" fill="#E63946" font-size="24" font-weight="bold">NC</text>
  
  <!-- Decorative Elements -->
  <line x1="120" y1="155" x2="180" y2="155" stroke="#FFD60A" stroke-width="2"/>
  <line x1="120" y1="185" x2="180" y2="185" stroke="#FFD60A" stroke-width="2"/>
</svg>