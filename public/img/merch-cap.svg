<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="capGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Cap Front -->
  <path d="M 60 150 Q 60 100 150 80 Q 240 100 240 150 L 240 170 Q 240 180 150 185 Q 60 180 60 170 Z" fill="url(#capGradient)" stroke="#D4AF37" stroke-width="2"/>
  
  <!-- Peak/Visor -->
  <ellipse cx="150" cy="175" rx="100" ry="25" fill="#0F172A" stroke="#D4AF37" stroke-width="2"/>
  <ellipse cx="150" cy="175" rx="95" ry="20" fill="#1E3A8A" stroke="none"/>
  
  <!-- Logo Area -->
  <circle cx="150" cy="130" r="35" fill="#FFD60A" stroke="#FFC300" stroke-width="2"/>
  
  <!-- Logo Text -->
  <text x="150" y="140" text-anchor="middle" fill="#E63946" font-size="20" font-weight="bold">NC</text>
  
  <!-- Strap Detail -->
  <rect x="80" y="165" width="140" height="15" fill="#0F172A" stroke="#D4AF37" stroke-width="1" rx="3"/>
  
  <!-- Side Eyelets -->
  <circle cx="70" cy="155" r="5" fill="#FFD60A"/>
  <circle cx="230" cy="155" r="5" fill="#FFD60A"/>
</svg>