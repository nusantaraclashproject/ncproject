<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2a3a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGradient)"/>
  
  <!-- Board Game Circle -->
  <circle cx="200" cy="200" r="140" fill="#8B4513" stroke="#D4AF37" stroke-width="3"/>
  
  <!-- Arena 1 - Engklek (Top) -->
  <rect x="170" y="80" width="60" height="60" fill="#FF6B6B" rx="5"/>
  <text x="200" y="115" text-anchor="middle" fill="white" font-size="12" font-weight="bold">ENGKLEK</text>
  
  <!-- Arena 2 - Gobak Sodor (Right) -->
  <rect x="280" y="170" width="60" height="60" fill="#4ECDC4" rx="5"/>
  <text x="310" y="205" text-anchor="middle" fill="white" font-size="12" font-weight="bold">SODOR</text>
  
  <!-- Arena 3 - Congklak (Bottom) -->
  <rect x="170" y="280" width="60" height="60" fill="#95E1D3" rx="5"/>
  <text x="200" y="315" text-anchor="middle" fill="white" font-size="12" font-weight="bold">CONGKLAK</text>
  
  <!-- Arena 4 - Gasing (Left) -->
  <rect x="60" y="170" width="60" height="60" fill="#FFE66D" rx="5"/>
  <text x="90" y="205" text-anchor="middle" fill="white" font-size="12" font-weight="bold">GASING</text>
  
  <!-- Center Lapangan -->
  <circle cx="200" cy="200" r="30" fill="#2c3e50" stroke="#D4AF37" stroke-width="2"/>
  <text x="200" y="205" text-anchor="middle" fill="#D4AF37" font-size="11" font-weight="bold">START</text>
  
  <!-- Tokens -->
  <circle cx="185" cy="185" r="6" fill="#FF1744"/>
  <circle cx="215" cy="185" r="6" fill="#00BCD4"/>
  <circle cx="200" cy="215" r="6" fill="#FFC107"/>
  
  <!-- Decorative Border -->
  <rect x="20" y="20" width="360" height="360" fill="none" stroke="#D4AF37" stroke-width="2" rx="10"/>
</svg>